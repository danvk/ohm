<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
      }
      #map {
        width: 100vw;
        height: 100vh;
      }
      #year {
        position: absolute;
        left: 3em;
        right: 1em;
      }
      #feature-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 300px;
        height: 100vh;
        background: white;
        box-shadow: -2px 0 8px rgba(0, 0, 0, 0.2);
        overflow-y: auto;
        padding: 1rem;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 10;
      }
      #feature-panel-close {
        float: right;
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        line-height: 1;
      }
      .feature-info + .feature-info {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #ddd;
      }
      .feature-info h3 {
        margin-bottom: 0.5rem;
        font-size: 13px;
        color: #666;
      }
      .feature-info table {
        width: 100%;
        border-collapse: collapse;
      }
      .feature-info th {
        text-align: left;
        color: #888;
        font-weight: normal;
        padding: 2px 8px 2px 0;
        white-space: nowrap;
        vertical-align: top;
      }
      .feature-info td {
        padding: 2px 0;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      window.dataReady = (async () => {
        const relationsR = fetch('/static/relations.json');
        const waysR = fetch('/static/ways.json');

        const [relations, ways] = await Promise.all([
          (await relationsR).json(),
          (await waysR).json(),
        ]);

        console.log(
          'Loaded',
          [...Object.keys(relations)].length,
          'relations and',
          [...Object.keys(ways)].length,
          'ways',
        );
        window.relations = relations;
        window.ways = ways;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
