<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OHM boundary viewer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      window.dataReady = (async () => {
        const relationsR = fetch('/static/relations.json');
        const waysR = fetch('/static/ways.json');

        const [relations, ways] = await Promise.all([
          (await relationsR).json(),
          (await waysR).json(),
        ]);

        console.log(
          'Loaded',
          [...Object.keys(relations)].length,
          'relations and',
          [...Object.keys(ways)].length,
          'ways',
        );
        window.relations = relations;
        window.ways = ways;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
