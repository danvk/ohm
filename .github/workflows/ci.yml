name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install osmium-tool
        run: sudo apt-get install -y osmium-tool

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest

      - name: Type check
        run: uv run pyright

      - name: Integration test
        run: ./stats-test/update.sh && git diff --exit-code

      - name: Build connectivity graph
        run: uv run build_connectivity_graph.py test-2026-04-02.osm.pbf

      - name: Extract for web
        run: uv run extract_for_web.py test-2026-04-02.osm.pbf --config boundary-viewer.config.jsonc --output-dir stats-test
